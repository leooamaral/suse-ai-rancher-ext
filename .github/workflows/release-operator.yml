name: Release SUSE AI Operator [Container and Helm Chart]

on:
  push:
    branches:
      - main
    paths:
      - 'charts/suse-ai-operator/**'
      - 'suse-ai-operator/**'
      - '.github/workflows/release-operator.yml'
    tags:
      - suse-ai-operator-*

env:
    CONTAINER_REGISTRY: ghcr.io/leooamaral/suse-ai-operator
    CHART_PATH: charts/suse-ai-operator
    CHART_REGISTRY: oci://ghcr.io/leooamaral/chart
    VERSION_PATH: suse-ai-operator/VERSION
    
jobs:
  prepare:
    outputs:
      VERSION: ${{ steps.tags.outputs.VERSION }}
      CHART_VERSION: ${{ steps.tags.outputs.CHART_VERSION }}
      PUBLISH: ${{ steps.tags.outputs.PUBLISH }}
      METADATA_TAGS: ${{ steps.tags.outputs.METADATA_TAGS }}
      NOTES_START_TAG: ${{ steps.tags.outputs.NOTES_START_TAG }}
      
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate tags
        id: tags
        shell: bash
        run: |
          ref=${{ github.ref }}
          case "$ref" in
            refs/heads/main)
              BASE_VERSION=$(cat $VERSION_PATH)
              
              git fetch --tags

              LAST_DEV=$(git tag \
                --list "suse-ai-operator-${BASE_VERSION}-dev.*" \
                --sort=-v:refname \
                | head -n 1)

              if [[ -z "$LAST_DEV" ]]; then
                DEV_NUM=1
                NOTES_START_TAG=$(git tag --list "suse-ai-operator-*" --sort=-v:refname | grep -v "\-dev" | head -n 1)
              else
                DEV_NUM="${LAST_DEV##*.}"
                DEV_NUM=$((DEV_NUM + 1))
                NOTES_START_TAG="$LAST_DEV"
              fi

              VERSION="${BASE_VERSION}-dev.${DEV_NUM}"
              IMAGE_TAGS="$VERSION"
              CHART_VERSION="$VERSION"

              {
                echo "METADATA_TAGS<<EOF"
                echo "$VERSION"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"

              PUBLISH=true
              ;;
            refs/tags/suse-ai-operator-*)
              VERSION="${ref#refs/tags/suse-ai-operator-}"
              IMAGE_TAGS="$VERSION"
              CHART_VERSION="$VERSION"
              NOTES_START_TAG=""

              {
                echo "METADATA_TAGS<<EOF"
                echo "$VERSION"
                if [[ "$VERSION" != *"-"* ]]; then
                  echo "latest"
                fi
                echo "EOF"
              } >> "$GITHUB_OUTPUT"

              PUBLISH=true
              ;;
            *)
              VERSION="${{ github.sha }}"
              IMAGE_TAGS="$VERSION"
              CHART_VERSION="$VERSION"
              NOTES_START_TAG=""

              {
                echo "METADATA_TAGS<<EOF"
                echo "$VERSION"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"

              PUBLISH=false
              ;;
          esac

          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAGS=$IMAGE_TAGS" >> "$GITHUB_OUTPUT"
          echo "PUBLISH=$PUBLISH" >> "$GITHUB_OUTPUT"
          echo "CHART_VERSION=$CHART_VERSION" >> "$GITHUB_OUTPUT"
          echo "NOTES_START_TAG=$NOTES_START_TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: needs.prepare.outputs.PUBLISH == 'true'
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        env:
          VERSION: ${{ needs.prepare.outputs.VERSION }}
        run: |
          docker build \
            -t $CONTAINER_REGISTRY:$VERSION \
            ./suse-ai-operator

      - name: Tag and push arch image
        env:
          VERSION: ${{ needs.prepare.outputs.VERSION }}
        run: |
          docker tag $CONTAINER_REGISTRY:$VERSION $CONTAINER_REGISTRY:$VERSION-${{ matrix.arch }}
          docker push $CONTAINER_REGISTRY:$VERSION-${{ matrix.arch }}


  manifest:
    needs: [prepare, build]
    if: needs.prepare.outputs.PUBLISH == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        env:
          VERSION: ${{ needs.prepare.outputs.VERSION }}
          RELEASE_TAGS: ${{ needs.prepare.outputs.METADATA_TAGS }}
        run: |
          while IFS= read -r tag; do
            docker buildx imagetools create \
              -t $CONTAINER_REGISTRY:$tag \
              $CONTAINER_REGISTRY:$VERSION-amd64 \
              $CONTAINER_REGISTRY:$VERSION-arm64
          done <<< "$RELEASE_TAGS"

      - name: Update Chart.yaml
        run: |
          yq -i '.version = "${{ needs.prepare.outputs.CHART_VERSION }}"' $CHART_PATH/Chart.yaml
          yq -i '.appVersion = "${{ needs.prepare.outputs.VERSION }}"' $CHART_PATH/Chart.yaml

      - name: Update image annotations
        run: |
          yq -i '
            .annotations."helm.sh/images" =
            "- image: ghcr.io/leooamaral/suse-ai-operator:${{ needs.prepare.outputs.VERSION }}\n  name: suse-ai-operator"
          ' $CHART_PATH/Chart.yaml

      - name: Package Helm Chart
        id: package
        run: |
          chart_package=$(helm package $CHART_PATH --destination . | awk '{print $NF}')
          echo "chart_package=$chart_package" >> $GITHUB_OUTPUT

      - name: Publish Helm Chart
        run: |
          helm push ${{ steps.package.outputs.chart_package }} $CHART_REGISTRY
